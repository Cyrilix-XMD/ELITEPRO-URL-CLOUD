<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        async function redirect() {
            document.body.innerHTML = "<h3>Loading...</h3>";

            try {
                const path = window.location.pathname.substring(1).toLowerCase(); // Get short code
                const response = await fetch("https://raw.githubusercontent.com/Cyrilix-XMD/ELITEPRO-URL-CLOUD/main/redirects.json");

                if (!response.ok) throw new Error("Failed to load redirects.");

                const redirects = await response.json();

                if (redirects[path]) {
                    window.location.href = redirects[path]; // Redirect to full URL
                } else {
                    document.body.innerHTML = "<h2>Invalid Short Link</h2>";
                }
            } catch (error) {
                document.body.innerHTML = `<h2>Error Loading Redirects</h2><p>${error.message}</p>`;
            }
        }

        redirect();
    </script>
</head>
<body>
    <h3>Redirecting...</h3>
</body>
</html>
