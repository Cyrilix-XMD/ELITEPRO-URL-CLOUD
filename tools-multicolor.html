<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🛠️ My Tools Website</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: url('https://images.unsplash.com/photo-1607083206300-7b8a6d4b9b57?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
      background-size: cover;
      color: #222;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #ffffff;
      font-weight: 600;
      text-shadow: 2px 2px 4px #000;
    }
    .tool {
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .tool:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 30px rgba(0,0,0,0.5);
    }
    .tool img {
      width: 60px;
      height: 60px;
      margin-bottom: 10px;
    }
    a.tool-link {
      text-decoration: none;
      color: white;
      background: #4caf50;
      padding: 10px 20px;
      border-radius: 5px;
      display: inline-block;
      margin-top: 10px;
      font-weight: bold;
    }
    a.tool-link:hover {
      background: #388e3c;
    }
  </style>
</head>
<body>
  <h1>🧰 My Tools</h1>

  <div class="tool" style="background: #ffebee;">
    <img src="https://img.icons8.com/emoji/48/target-emoji.png" alt="UID Extractor">
    <h2>UID Extractor</h2>
    <a class="tool-link" href="#">Open Tool</a>
  </div>

  <div class="tool" style="background: #e8f5e9;">
    <img src="https://img.icons8.com/emoji/48/locked-with-key.png" alt="Token Generator">
    <h2>Token Generator</h2>
    <a class="tool-link" href="#">Open Tool</a>
  </div>

  <div class="tool" style="background: #e3f2fd;">
    <img src="https://img.icons8.com/emoji/48/studio-microphone.png" alt="Voice Maker">
    <h2>Voice Maker</h2>
    <a class="tool-link" href="#">Open Tool</a>
  </div>

  <div class="tool" style="background: #fff3e0;">
    <img src="https://img.icons8.com/emoji/48/outbox-tray-emoji.png" alt="Voice Sender">
    <h2>Voice Sender</h2>
    <a class="tool-link" href="#">Open Tool</a>
  </div>

  <div class="tool" style="background: #f3e5f5;">
    <img src="https://img.icons8.com/emoji/48/police-car-light.png" alt="FB Reporter">
    <h2>FB Reporter</h2>
    <a class="tool-link" href="#">Open Tool</a>
  </div>

  <div class="tool" style="background: #e0f7fa;">
    <img src="https://img.icons8.com/emoji/48/framed-picture.png" alt="OCR">
    <h2>OCR</h2>
    <a class="tool-link" href="#">Open Tool</a>
  </div>

  <div class="tool" style="background: #fce4ec;">
    <img src="https://img.icons8.com/emoji/48/qr-code.png" alt="QR Code">
    <h2>QR Code</h2>
    <a class="tool-link" href="#">Open Tool</a>
  </div>

  <div class="tool" style="background: #f1f8e9;">
    <img src="https://img.icons8.com/emoji/48/memo.png" alt="Group Renamer">
    <h2>Group Renamer</h2>
    <a class="tool-link" href="#">Open Tool</a>
  </div>

  <div class="tool" style="background: #ede7f6;">
    <img src="https://img.icons8.com/emoji/48/cookie.png" alt="Cookie Token">
    <h2>Cookie Token</h2>
    <a class="tool-link" href="#">Open Tool</a>
  </div>

  <div class="tool" style="background: #fff8e1;">
    <img src="https://img.icons8.com/emoji/48/robot.png" alt="Auto Reply">
    <h2>Auto Reply</h2>
    <a class="tool-link" href="#">Open Tool</a>
  </div>

  <p style="margin-top: 40px; font-size: 16px; color: #eee;">🚀 Made by Piyush | © 2025</p>
</body>
</html>
